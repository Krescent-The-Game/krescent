<!DOCTYPE html>

  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Krescent — Docs</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="hero" style="padding-top: 60px">
      <div class="container">
        <h1>Controls</h1>
        <article class="card">
          <h2>Keyboard</h2>
          <ul>
            <li><strong>W / ↑</strong> — accelerate</li>
            <li><strong>S / ↓</strong> — brake</li>
            <li><strong>A / D</strong> — steer</li>
            <li><strong>Space</strong> — shoot</li>
          </ul>
          <h2 style="margin-top: 20px">Stack</h2>
          <ul>
            <li>Nuxt 2 (SPA mode)</li>
            <li>BabylonJS 4 + vue-babylonjs</li>
            <li>Ant Design Vue</li>
          </ul>
          <p style="margin-top: 16px"><a href="/">← Back to Krescent</a></p>

      </div>
